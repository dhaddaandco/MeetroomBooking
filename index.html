<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeting Room Booking</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <div>
        <p class="eyebrow">Office Scheduler</p>
        <h1>Meeting Room Booking</h1>
        <p class="hero-copy">Reserve Darshan, Jnan, Charitra, Setu, or Samvad with a clear room-wise schedule.</p>
      </div>
      <div class="hero-clock" aria-live="polite">
        <span id="todayLabel">Today</span>
        <strong id="liveClock">--:--</strong>
      </div>
    </section>

    <section class="booking-layout" aria-label="Meeting room booking workspace">
      <form class="booking-form" id="bookingForm">
        <div class="section-title">
          <span>Book a Room</span>
          <small>Fill details below</small>
        </div>

        <label>
          Meeting room name
          <select id="roomName" required>
            <option value="">Select a room</option>
            <optgroup label="2nd Floor">
              <option value="Darshan" data-floor="2nd Floor">Darshan</option>
              <option value="Jnan" data-floor="2nd Floor">Jnan</option>
              <option value="Charitra" data-floor="2nd Floor">Charitra</option>
            </optgroup>
            <optgroup label="1st Floor">
              <option value="Setu" data-floor="1st Floor">Setu</option>
              <option value="Samvad" data-floor="1st Floor">Samvad</option>
            </optgroup>
          </select>
        </label>

        <div class="time-row">
          <label>
            From
            <input id="fromTime" type="time" required>
          </label>
          <label>
            To
            <input id="toTime" type="time" required>
          </label>
        </div>

        <label>
          Team name
          <input id="teamName" type="text" placeholder="Example: HR Team" required>
        </label>

        <label>
          Purpose
          <textarea id="purpose" rows="4" placeholder="Example: Weekly planning discussion" required></textarea>
        </label>

        <button type="submit" class="primary-button">Add Booking</button>
        <p class="form-message" id="formMessage" role="status"></p>
      </form>

      <section class="schedule-panel">
        <div class="schedule-header">
          <div>
            <p class="eyebrow">Live Board</p>
            <h2>Today's Bookings</h2>
          </div>
          <button type="button" class="clear-button" id="clearBookings">Clear All</button>
        </div>

        <div class="floor-tabs" role="tablist" aria-label="Filter rooms by floor">
          <button type="button" class="floor-tab active" data-floor="All">All</button>
          <button type="button" class="floor-tab" data-floor="2nd Floor">2nd Floor</button>
          <button type="button" class="floor-tab" data-floor="1st Floor">1st Floor</button>
        </div>

        <div class="room-grid" id="roomGrid" aria-live="polite"></div>
      </section>
    </section>
  </main>

  <template id="roomCardTemplate">
    <article class="room-card">
      <div class="room-card-top">
        <div>
          <h3></h3>
          <span class="floor-label"></span>
        </div>
        <span class="room-status"></span>
      </div>
      <div class="booking-list"></div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
